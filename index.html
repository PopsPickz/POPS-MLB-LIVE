<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POPS Pickz MLB Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="hero">
      <div class="live-pill">● LIVE</div>
      <h1>POPS PICKZ</h1>
      <h2>MLB LIVE</h2>
      <p>Scores • Scouting Reports • HR Targets • Pitcher Risk</p>
    </header>

    <section class="dashboard">
      <div class="dash-card">⚾<span>Live Scores</span></div>
      <div class="dash-card">📊<span>Scouting</span></div>
      <div class="dash-card">💣<span>HR Targets</span></div>
    </section>

    <section class="content-card">
      <h2>⚾ Today's MLB Games</h2>
      <div id="scoresBox">Loading games...</div>
    </section>

    <section class="content-card">
      <h2>📊 Game Scouting Report</h2>
      <div id="scoutingBox">Tap any game to view scouting report.</div>
    </section>

    <section class="content-card">
      <h2>💣 POPS HR Targets</h2>
      <div id="hrBox">Loading HR targets...</div>
    </section>

  </div>

  <script src="api.js"></script>
  <script src="scouting.js"></script>
  <script src="app.js"></script>
</body>
</html>
