<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POPS Pickz MLB Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="hero">
  <h1>POPS Pickz MLB Live</h1>
  <p>Live Scores • Lineups • HR Tracker 💣 • POPS HR Targets</p>
</header>

<main class="container">
  <section class="card">
    <h2>⚾ Live MLB Scores</h2>
    <div id="scoresBox">Loading live scores...</div>
  </section>

  <section class="card">
    <h2>📊 Game Scouting Report</h2>
    <p>Tap any game to view pitchers, lineups, and POPS HR targets.</p>
    <div id="gameDetailsBox">Select a game to view details.</div>
  </section>

  <section class="card">
    <h2>💣 Live Home Run Tracker</h2>
    <div id="hrBox">Loading home runs...</div>
  </section>
</main>

<script src="api.js"></script>
<script src="pitchers.js"></script>
<script src="formula.js"></script>
<script src="homeruns.js"></script>
<script src="scouting.js"></script>
<script src="app.js"></script>

</body>
</html>
