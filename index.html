<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POPS Pickz MLB Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <h1>POPS Pickz MLB Live</h1>
    <p>Live Scores • Official Lineups • Home Run Tracker 💣</p>
  </header>

  <main class="container">

    <section class="card">
      <h2>⚾ Live MLB Scores</h2>
      <div id="scoresBox">Loading live scores...</div>
    </section>

    <section class="card">
      <h2>👥 Official Lineups</h2>
      <div id="lineupsBox">Loading lineups...</div>
    </section>

    <section class="card">
      <h2>💣 Live Home Run Tracker</h2>
      <div id="hrBox">Loading home runs...</div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
