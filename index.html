<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>POPS Pickz MLB 10.0</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <header class="hero">
      <h1>⚾ POPS Pickz 10.0</h1>
      <p>Automatic MLB HR Pickz • Hit Pickz • Moneyline Edges</p>
    </header>

    <nav class="tabs">
      <button onclick="showTab('pitchers')">
        🎯 Pitchers
      </button>

      <button onclick="showTab('homeruns')">
        💣 HR Pickz
      </button>

      <button onclick="showTab('hits')">
        🔥 Hit Pickz
      </button>

      <button onclick="showTab('moneyline')">
        💰 Moneyline
      </button>
    </nav>

    <div id="gamesBox" style="display: none;"></div>

    <section
      class="card tab-section active"
      id="pitchers"
    >
      <h2>🎯 Today's Pitchers To Target</h2>

      <div id="pitchersBox">
        <p>Loading pitcher targets...</p>
      </div>
    </section>

    <section
      class="card tab-section"
      id="homeruns"
    >
      <h2>💣 POPS Home Run Pickz</h2>

      <div id="hrPicksBox">
        <p>Loading HR Pickz...</p>
      </div>
    </section>

    <section
      class="card tab-section"
      id="hits"
    >
      <h2>🔥 POPS Hit Pickz</h2>

      <div id="hitPicksBox">
        <p>Loading Hit Pickz...</p>
      </div>
    </section>

    <section
      class="card tab-section"
      id="moneyline"
    >
      <h2>💰 POPS Moneyline Pickz</h2>

      <div id="moneylineBox">
        <p>Loading moneyline picks...</p>
      </div>
    </section>

  </div>

  <script>
    function showTab(id) {
      document
        .querySelectorAll(".tab-section")
        .forEach(section => {
          section.classList.remove("active");
        });

      const target = document.getElementById(id);

      if (target) {
        target.classList.add("active");
      }

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }
  </script>

  <script src="api.js"></script>
  <script src="statcast.js"></script>
  <script src="formula.js"></script>

  <!-- New POPS HR Formula 3.0 engine -->
  

  <script src="statcast-api.js"></script>
  <script src="moneyline.js"></script>
  <script src="homerun.js"></script>
  <script src="pitchers.js"></script>

  <!-- app.js must load last -->
  <script src="app.js"></script>
</body>
</html>
