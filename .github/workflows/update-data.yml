name: Update POPS MLB Data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create data folder
        run: mkdir -p data

      - name: Download Today's MLB Schedule
        run: |
          TODAY=$(date -u +%F)
          curl "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=$TODAY&hydrate=team,probablePitcher,venue" -o data/schedule.json

      - name: Commit Updated Data
        run: |
          git config user.name "POPS Pickz Bot"
          git config user.email "actions@github.com"
          git add data/schedule.json
          git diff --cached --quiet || git commit -m "Daily MLB Update"
          git push
