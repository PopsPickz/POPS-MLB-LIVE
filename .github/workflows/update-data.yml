name: Update POPS MLB Data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build POPS daily data
        run: node scripts/build-data.js

      - name: Commit Updated Data
        run: |
          git config user.name "POPS Pickz Bot"
          git config user.email "actions@github.com"
          git add data/today.json
          git diff --cached --quiet || git commit -m "Update POPS today data"
          git push
